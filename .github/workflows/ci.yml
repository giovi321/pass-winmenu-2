name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history and tags so the csproj PreBuild `git describe --tags` works.
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore pass-winmenu.sln

      - name: Build
        run: dotnet build pass-winmenu.sln -c Release --no-restore

      - name: Test
        run: dotnet test pass-winmenu.sln -c Release --no-build --verbosity normal
